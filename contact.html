<!-- ================= CONTACT FORM ================= -->

<section class="contact-section">

    <h1>Contact Us</h1>

    <p>
        We'd love to hear from you. Fill out the form below and our team will contact you shortly.
    </p>

    <div class="contact-form">

        <form id="contactForm">

            <input
                type="text"
                id="fullName"
                placeholder="Full Name"
                required>

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required>

            <input
                type="tel"
                id="phone"
                placeholder="Phone Number">

            <input
                type="text"
                id="subject"
                placeholder="Subject">

            <textarea
                id="message"
                rows="6"
                placeholder="Write Your Message..."
                required></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

    </div>

</section>
