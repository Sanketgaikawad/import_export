<section class="contact-section">

    <h1>Contact Us</h1>

    <p>
        We'd love to hear from you. Fill out the form below and our team will contact you shortly.
    </p>

    <div class="contact-form">

        <form id="contactForm">

            <input
                type="text"
                id="fullName"
                name="entry.882498564"
                placeholder="Full Name"
                required>

            <input
                type="email"
                id="email"
                name="entry.350435166"
                placeholder="Email Address"
                required>

            <input
                type="tel"
                id="phone"
                name="entry.183780824"
                placeholder="Phone Number"
                required>

            <input
                type="text"
                id="subject"
                placeholder="Subject"
                required>

            <textarea
                id="message"
                name="entry.667496053"
                rows="6"
                placeholder="Write Your Message..."
                required></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

    </div>

</section>
